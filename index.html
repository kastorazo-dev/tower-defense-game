<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tower Defense Game</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h1>Tower Defense</h1>
            
            <div class="stats">
                <div class="stat">
                    <span class="label">Monedas</span>
                    <span class="value" id="money">200</span>
                </div>
                <div class="stat">
                    <span class="label">HP Base</span>
                    <span class="value" id="health">100</span>
                </div>
                <div class="stat">
                    <span class="label">Ola</span>
                    <span class="value" id="wave">1</span>
                </div>
            </div>

            <div class="towers-section">
                <h3>Torres Disponibles</h3>
                
                <button class="tower-btn basic" id="tower-basic" data-tower="basic">
                    <div class="tower-icon">⚔️</div>
                    <div class="tower-name">Torre Básica</div>
                    <div class="tower-cost">Costo: 50</div>
                    <div class="tower-desc">Equilibrada</div>
                </button>

                <button class="tower-btn fast" id="tower-fast" data-tower="fast">
                    <div class="tower-icon">⚡</div>
                    <div class="tower-name">Torre Rápida</div>
                    <div class="tower-cost">Costo: 60</div>
                    <div class="tower-desc">Disparo rápido</div>
                </button>

                <button class="tower-btn area" id="tower-area" data-tower="area">
                    <div class="tower-icon">💥</div>
                    <div class="tower-name">Torre Área</div>
                    <div class="tower-cost">Costo: 80</div>
                    <div class="tower-desc">Daño explosivo</div>
                </button>
            </div>

            <div class="controls-section">
                <h3>Controles</h3>
                <div class="control-info">
                    <p><strong>Click izquierdo:</strong> Colocar/Mejorar</p>
                    <p><strong>Click derecho:</strong> Mejorar torre</p>
                    <p><strong>V + Click:</strong> Vender</p>
                    <p><strong>ESC:</strong> Cancelar</p>
                </div>
            </div>

            <div class="game-over" id="gameOver" style="display: none;">
                <h2>GAME OVER</h2>
                <p id="gameOverText">La base fue destruida</p>
                <button onclick="location.reload()">Reiniciar</button>
            </div>
        </div>

        <div class="game-area">
            <canvas id="gameCanvas"></canvas>
        </div>
    </div>

    <script src="js/tower.js"></script>
    <script src="js/enemy.js"></script>
    <script src="js/projectile.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
